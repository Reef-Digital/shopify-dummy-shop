<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#f8f9fa"/>
  <!-- Surf wax bar -->
  <g transform="translate(80, 300)">
    <!-- Wax block -->
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#f0c040"/>
    <rect x="5" y="5" width="110" height="70" rx="8" fill="#f5d060"/>
    <!-- Wax label -->
    <rect x="15" y="15" width="90" height="50" rx="5" fill="#e8b020"/>
    <text x="60" y="38" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">SURF</text>
    <text x="60" y="55" text-anchor="middle" font-family="Arial" font-size="11" fill="white">WAX</text>
  </g>
  <!-- Wax comb -->
  <g transform="translate(250, 280)">
    <!-- Handle -->
    <rect x="0" y="30" width="100" height="40" rx="5" fill="#333"/>
    <!-- Teeth -->
    <rect x="5" y="70" width="8" height="25" rx="1" fill="#333"/>
    <rect x="18" y="70" width="8" height="25" rx="1" fill="#333"/>
    <rect x="31" y="70" width="8" height="25" rx="1" fill="#333"/>
    <rect x="44" y="70" width="8" height="25" rx="1" fill="#333"/>
    <rect x="57" y="70" width="8" height="25" rx="1" fill="#333"/>
    <rect x="70" y="70" width="8" height="25" rx="1" fill="#333"/>
    <rect x="83" y="70" width="8" height="25" rx="1" fill="#333"/>
    <!-- Smooth edge -->
    <path d="M0 30 L100 30 L100 25 C100 15 90 10 80 10 L20 10 C10 10 0 15 0 25 Z" fill="#444"/>
    <!-- Fin key hole -->
    <rect x="40" y="16" width="20" height="6" rx="2" fill="#555"/>
  </g>
  <!-- Waterproof watch -->
  <g transform="translate(400, 270)">
    <!-- Strap top -->
    <rect x="55" y="0" width="40" height="70" rx="8" fill="#2d2d2d"/>
    <!-- Watch face -->
    <circle cx="75" cy="80" r="50" fill="#333"/>
    <circle cx="75" cy="80" r="45" fill="#1a1a1a"/>
    <circle cx="75" cy="80" r="42" fill="#222"/>
    <!-- Watch bezel markers -->
    <line x1="75" y1="42" x2="75" y2="48" stroke="#2BBCE0" stroke-width="2"/>
    <line x1="75" y1="112" x2="75" y2="118" stroke="#666" stroke-width="1.5"/>
    <line x1="33" y1="80" x2="39" y2="80" stroke="#666" stroke-width="1.5"/>
    <line x1="111" y1="80" x2="117" y2="80" stroke="#666" stroke-width="1.5"/>
    <!-- Watch hands -->
    <line x1="75" y1="80" x2="75" y2="52" stroke="#2BBCE0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="75" y1="80" x2="95" y2="72" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="75" cy="80" r="3" fill="#2BBCE0"/>
    <!-- Strap bottom -->
    <rect x="55" y="120" width="40" height="70" rx="8" fill="#2d2d2d"/>
    <!-- Strap holes -->
    <circle cx="75" cy="145" r="3" fill="#1a1a1a"/>
    <circle cx="75" cy="158" r="3" fill="#1a1a1a"/>
    <circle cx="75" cy="171" r="3" fill="#1a1a1a"/>
    <!-- Crown button -->
    <rect x="120" y="73" width="10" height="14" rx="3" fill="#444"/>
  </g>
  <!-- Repair kit -->
  <g transform="translate(100, 130)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#3b82f6"/>
    <rect x="5" y="5" width="130" height="90" rx="6" fill="#60a5fa"/>
    <!-- Cross/plus -->
    <rect x="55" y="25" width="30" height="8" rx="2" fill="white" opacity="0.7"/>
    <rect x="66" y="14" width="8" height="30" rx="2" fill="white" opacity="0.7"/>
    <text x="70" y="72" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">REPAIR KIT</text>
    <!-- Latch -->
    <rect x="55" y="92" width="30" height="8" rx="2" fill="#2563eb"/>
  </g>
</svg>