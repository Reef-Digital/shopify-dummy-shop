<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#f8f9fa"/>
  <!-- Shadow -->
  <ellipse cx="300" cy="555" rx="130" ry="10" fill="#e0e0e0"/>
  <!-- Bag body -->
  <path d="M260 60 C250 60 240 70 238 90 L220 500 C218 530 240 550 270 550 L330 550 C360 550 382 530 380 500 L362 90 C360 70 350 60 340 60 Z" fill="#6b7280"/>
  <!-- Bag front panel -->
  <path d="M265 70 C258 70 252 78 250 92 L234 495 C232 522 250 540 275 540 L325 540 C350 540 368 522 366 495 L350 92 C348 78 342 70 335 70 Z" fill="#9ca3af"/>
  <!-- Zipper line -->
  <path d="M300 65 L300 545" stroke="#d1d5db" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Zipper pull -->
  <rect x="295" y="200" width="10" height="14" rx="3" fill="#e5e7eb"/>
  <!-- Handle -->
  <path d="M275 180 C275 165 285 158 300 158 C315 158 325 165 325 180" fill="none" stroke="#4b5563" stroke-width="6" stroke-linecap="round"/>
  <!-- Shoulder strap top -->
  <path d="M270 100 L250 80 L240 80" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Shoulder strap bottom -->
  <path d="M270 350 L250 370 L240 370" stroke="#4b5563" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Strap connector -->
  <line x1="240" y1="80" x2="240" y2="370" stroke="#4b5563" stroke-width="4"/>
  <!-- Pocket -->
  <rect x="270" y="400" width="60" height="50" rx="5" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Pocket zipper -->
  <line x1="280" y1="400" x2="320" y2="400" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Nose guard -->
  <path d="M265 70 L300 55 L335 70" fill="#4b5563"/>
  <!-- Brand tag -->
  <rect x="285" y="280" width="30" height="15" rx="2" fill="#4b5563"/>
  <rect x="288" y="283" width="24" height="9" rx="1" fill="#6b7280"/>
</svg>