<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#f8f9fa"/>
  <!-- Coiled leash cord -->
  <path d="M300 100 C380 100 420 140 420 180 C420 220 380 250 300 250 C220 250 180 290 180 330 C180 370 220 400 300 400 C380 400 420 440 420 480"
        fill="none" stroke="#2BBCE0" stroke-width="8" stroke-linecap="round"/>
